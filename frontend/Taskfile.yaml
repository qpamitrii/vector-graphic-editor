version: "3"

tasks:
  format:
    cmds:
      - npm run format
  lint:
    cmds:
      - npm run lint

  # docker environment
  image:
    cmds:
      - docker build --build-arg VITE_SERVER_ADDR={{.SERVER_ADDR | default "localhost:8080"}} -t {{.REGISTRY}}/vge.client:latest .
  publish:
    cmds:
      - docker push {{.REGISTRY}}/vge.client:latest
  deploy:
    cmds:
      - docker network create vge || true
      - docker compose up -d

  # ci environment
  ci:
    cmds:
      - npm ci
  ci:build:
    env:
      VITE_SERVER_ADDR: '{{.SERVER_ADDR | default "localhost:8080"}}'
    cmds:
      - node_modules/.bin/vite build --base={{.BASE | default "/"}}

  # development environment
  dev:run:
    env:
      VITE_SERVER_ADDR: localhost:8080
    cmds:
      - npm run dev -- --port=5000
