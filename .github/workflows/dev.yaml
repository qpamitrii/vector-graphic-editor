name: dev
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .devcontainer/**
jobs:
  pre-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login
        uses: docker/login-action@v2
        with:
          registry: ghcr.io/fami-2026
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-Build Image
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/fami-2026/vge.dev
          cacheFrom: ghcr.io/fami-2026/vge.dev
          push: always
